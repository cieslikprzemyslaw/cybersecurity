<svg width="1100" height="560" viewBox="0 0 1100 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Multi-stage Docker build flow</title>
  <desc id="desc">A build stage compiles the app, a production dependency stage installs runtime dependencies, and a runtime stage receives only selected artifacts.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1100" height="560" fill="#f8fafc"/>
  <text x="55" y="60" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700" fill="#0f172a">Multi-stage build flow</text>
  <text x="55" y="92" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#475569">Build with full tooling, then copy only required runtime artifacts into the final image</text>

  <g filter="url(#shadow)">
    <rect x="55" y="150" width="280" height="220" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="195" y="193" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">build stage</text>
    <text x="195" y="230" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#1d4ed8">npm ci</text>
    <text x="195" y="258" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#1d4ed8">Prisma generate</text>
    <text x="195" y="286" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#1d4ed8">TypeScript build</text>
    <text x="195" y="314" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#1d4ed8">dev tooling allowed here</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="415" y="150" width="280" height="220" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="555" y="193" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700" fill="#14532d">production deps</text>
    <text x="555" y="235" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#166534">npm ci --omit=dev</text>
    <text x="555" y="263" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#166534">runtime dependencies only</text>
    <text x="555" y="291" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#166534">faster than prune</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="775" y="150" width="280" height="220" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="915" y="193" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700" fill="#7c2d12">runtime stage</text>
    <text x="915" y="235" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#9a3412">compiled output</text>
    <text x="915" y="263" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#9a3412">production node_modules</text>
    <text x="915" y="291" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#9a3412">startup command</text>
    <text x="915" y="319" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#9a3412">no dev tooling</text>
  </g>

  <path d="M335 260 H415" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M695 260 H775" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="55" y="430" width="1000" height="70" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="555" y="460" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Hardening idea</text>
  <text x="555" y="487" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#475569">The final image should contain only what the application needs to run, not everything needed to build, test or develop it.</text>
</svg>