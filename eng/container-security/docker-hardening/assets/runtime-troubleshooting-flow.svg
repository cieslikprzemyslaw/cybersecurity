<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Docker runtime troubleshooting flow</title>
  <desc id="desc">Troubleshooting flow from browser failure to compose status, logs, endpoint checks and runtime fixes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="64" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Runtime troubleshooting flow</text>
  <text x="64" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Debug the running system, not just the Dockerfile.</text>

  <rect x="72" y="185" width="220" height="100" rx="18" fill="#fef2f2" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/>
  <text x="182" y="225" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#7f1d1d">Symptom</text>
  <text x="182" y="254" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#991b1b">connection refused</text>

  <rect x="380" y="185" width="240" height="100" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="225" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#0f172a">Check services</text>
  <text x="500" y="254" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">docker compose ps</text>

  <rect x="710" y="185" width="240" height="100" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="830" y="225" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#0f172a">Read logs</text>
  <text x="830" y="254" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">docker compose logs api</text>

  <rect x="1015" y="185" width="220" height="100" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <text x="1125" y="225" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#064e3b">Find cause</text>
  <text x="1125" y="254" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#047857">crash / wrong route</text>

  <path d="M 302 235 L 368 235" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 630 235 L 698 235" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 960 235 L 1003 235" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="160" y="410" width="260" height="120" rx="20" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="290" y="455" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1e3a8a">If API is down</text>
  <text x="290" y="485" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#1d4ed8">fix runtime error</text>
  <text x="290" y="512" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#1d4ed8">then rebuild container</text>

  <rect x="510" y="410" width="260" height="120" rx="20" fill="#fefce8" stroke="#facc15" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="455" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#713f12">If route is 404</text>
  <text x="640" y="485" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#854d0e">API is running</text>
  <text x="640" y="512" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#854d0e">check endpoint path</text>

  <rect x="860" y="410" width="260" height="120" rx="20" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <text x="990" y="455" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#064e3b">Validate</text>
  <text x="990" y="485" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#047857">/api/health</text>
  <text x="990" y="512" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#047857">web proxy test</text>

  <path d="M 1125 292 C 1080 350 1010 370 990 400" stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1125 292 C 970 350 700 370 650 400" stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1125 292 C 930 350 420 370 300 400" stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="76" y="620" width="1120" height="48" rx="14" fill="#e2e8f0"/>
  <text x="100" y="650" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">Key idea: connection refused means no process is listening; 404 means something is listening but the path is wrong.</text>
</svg>
