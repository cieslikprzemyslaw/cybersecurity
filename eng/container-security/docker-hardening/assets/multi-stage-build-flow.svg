<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Multi-stage Docker build flow</title>
  <desc id="desc">Build stage and production dependencies stage are separate sources copied into the final runtime stage.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="64" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Multi-stage build flow</text>
  <text x="64" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">The final runtime image receives selected artifacts from earlier stages.</text>

  <rect x="80" y="190" width="300" height="180" rx="22" fill="#eef2ff" stroke="#818cf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="240" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#312e81">build stage</text>
  <text x="230" y="278" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#4338ca">full dependencies</text>
  <text x="230" y="306" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#4338ca">Prisma generate</text>
  <text x="230" y="334" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#4338ca">TypeScript compile</text>

  <rect x="80" y="440" width="300" height="150" rx="22" fill="#ecfeff" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="490" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#164e63">production dependencies</text>
  <text x="230" y="530" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#0e7490">npm ci --omit=dev</text>
  <text x="230" y="558" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#0e7490">runtime node_modules</text>

  <rect x="840" y="260" width="330" height="240" rx="26" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <text x="1005" y="320" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#064e3b">final runtime image</text>
  <text x="1005" y="365" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#047857">slim runtime base</text>
  <text x="1005" y="397" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#047857">compiled server files</text>
  <text x="1005" y="429" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#047857">production node_modules</text>
  <text x="1005" y="461" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#047857">runtime command</text>

  <path d="M 390 280 C 560 280 645 315 825 345" stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="610" y="272" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">COPY --from=build dist-server</text>

  <path d="M 390 515 C 560 515 645 465 825 420" stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="617" y="534" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">COPY --from=production-dependencies node_modules</text>

  <rect x="66" y="620" width="1120" height="48" rx="14" fill="#e2e8f0"/>
  <text x="90" y="650" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">Key idea: build stages can be large; the final image should contain only the files needed at runtime.</text>
</svg>
