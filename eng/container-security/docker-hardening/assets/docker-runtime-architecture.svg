<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Docker runtime architecture for AppSec Report Builder</title>
  <desc id="desc">Browser connects to nginx web container, nginx proxies API and uploads traffic to Node API container, and API reads and writes SQLite and uploads volumes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="64" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Docker runtime architecture</text>
  <text x="64" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Request/response flow and persistent storage for the containerized app.</text>

  <rect x="64" y="180" width="220" height="120" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="174" y="230" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Browser</text>
  <text x="174" y="260" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">localhost:8080</text>

  <rect x="420" y="150" width="280" height="180" rx="22" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="560" y="205" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#1e3a8a">web container</text>
  <text x="560" y="237" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#1d4ed8">nginx unprivileged</text>
  <text x="560" y="267" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">serves React/Vite static files</text>
  <text x="560" y="294" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">proxies /api and /uploads</text>

  <rect x="850" y="150" width="300" height="180" rx="22" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <text x="1000" y="205" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#064e3b">api container</text>
  <text x="1000" y="237" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#047857">Node.js / Express</text>
  <text x="1000" y="267" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">API_PORT=3000</text>
  <text x="1000" y="294" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">health: /api/health</text>

  <path d="M 290 240 L 412 240" stroke="#2563eb" stroke-width="4" fill="none" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="351" y="218" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#334155">HTTP</text>

  <path d="M 710 240 L 842 240" stroke="#2563eb" stroke-width="4" fill="none" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="776" y="216" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#334155">Docker network</text>
  <text x="776" y="265" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#64748b">http://api:3000</text>

  <rect x="762" y="470" width="230" height="120" rx="18" fill="#fff7ed" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="877" y="520" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#7c2d12">api-data volume</text>
  <text x="877" y="552" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#9a3412">SQLite database file</text>

  <rect x="1035" y="470" width="230" height="120" rx="18" fill="#fef2f2" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/>
  <text x="1150" y="520" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#7f1d1d">api-uploads volume</text>
  <text x="1150" y="552" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#991b1b">evidence and assets</text>

  <path d="M 955 338 C 935 385 910 425 885 464" stroke="#2563eb" stroke-width="4" fill="none" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <path d="M 1045 338 C 1072 385 1118 425 1140 464" stroke="#2563eb" stroke-width="4" fill="none" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <rect x="64" y="622" width="1090" height="46" rx="14" fill="#e2e8f0"/>
  <text x="88" y="651" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">Key idea: containers are disposable; application data that must survive restarts belongs in volumes.</text>
</svg>
