<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Container hardening layers</title>
  <desc id="desc">Container hardening decisions grouped into build-time, image, runtime, storage and future controls.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="64" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Container hardening layers</text>
  <text x="64" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Hardening is a set of small decisions across build, image, runtime and storage.</text>

  <rect x="80" y="165" width="330" height="180" rx="24" fill="#eef2ff" stroke="#818cf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="245" y="215" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#312e81">Build-time</text>
  <text x="115" y="257" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#4338ca">• npm ci from lockfile</text>
  <text x="115" y="287" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#4338ca">• BuildKit secret for .npmrc</text>
  <text x="115" y="317" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#4338ca">• reproducible build steps</text>

  <rect x="475" y="165" width="330" height="180" rx="24" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="215" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#064e3b">Image</text>
  <text x="510" y="257" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#047857">• multi-stage Dockerfile</text>
  <text x="510" y="287" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#047857">• production dependencies only</text>
  <text x="510" y="317" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#047857">• no dev tooling in runtime</text>

  <rect x="870" y="165" width="330" height="180" rx="24" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="1035" y="215" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">Runtime</text>
  <text x="905" y="257" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#1d4ed8">• explicit ports and env vars</text>
  <text x="905" y="287" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#1d4ed8">• healthcheck</text>
  <text x="905" y="317" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#1d4ed8">• separate migration service</text>

  <rect x="255" y="415" width="330" height="170" rx="24" fill="#fff7ed" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="465" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#7c2d12">Persistent data</text>
  <text x="290" y="507" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#9a3412">• SQLite in api-data volume</text>
  <text x="290" y="537" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#9a3412">• uploads in api-uploads volume</text>
  <text x="290" y="567" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#9a3412">• containers remain disposable</text>

  <rect x="695" y="415" width="330" height="170" rx="24" fill="#fef2f2" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/>
  <text x="860" y="465" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#7f1d1d">Next controls</text>
  <text x="730" y="507" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#991b1b">• drop capabilities</text>
  <text x="730" y="537" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#991b1b">• no-new-privileges</text>
  <text x="730" y="567" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#991b1b">• read-only filesystem, seccomp</text>

  <rect x="84" y="632" width="1110" height="46" rx="14" fill="#e2e8f0"/>
  <text x="108" y="661" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">Key idea: the runtime image should not be a copy of the development machine.</text>
</svg>
